name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DragonEnvelopes.sln

      - name: Verify architecture dependencies
        shell: pwsh
        run: ./eng/verify-architecture.ps1 -RepoRoot .

      - name: Build
        run: dotnet build DragonEnvelopes.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DragonEnvelopes.sln --configuration Release --no-build --logger trx --results-directory TestResults

      - name: Publish desktop app (win-x64)
        run: dotnet publish client/DragonEnvelopes.Desktop/DragonEnvelopes.Desktop.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:SatelliteResourceLanguages=en --output artifacts/desktop/publish

      - name: Build desktop MSI installer
        run: dotnet build installer/DragonEnvelopes.Desktop.Installer/DragonEnvelopes.Desktop.Installer.wixproj --configuration Release -p:ProductVersion=1.0.${{ github.run_number }} -p:PublishDir="${{ github.workspace }}\\artifacts\\desktop\\publish"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Upload desktop publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragonenvelopes-desktop-publish
          path: artifacts/desktop/publish/**

      - name: Upload desktop MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragonenvelopes-desktop-msi
          path: installer/**/bin/**/DragonEnvelopes.Desktop.Setup.msi

  docker-smoke-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api
            dockerfile: src/DragonEnvelopes.Api/Dockerfile
          - name: family-api
            dockerfile: src/DragonEnvelopes.Family.Api/Dockerfile
          - name: ledger-api
            dockerfile: src/DragonEnvelopes.Ledger.Api/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Smoke build Dockerfile
        run: docker build --file ${{ matrix.service.dockerfile }} --tag dragonenvelopes-ci-${{ matrix.service.name }}:${{ github.sha }} .
