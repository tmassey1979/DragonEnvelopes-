name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DragonEnvelopes.sln

      - name: Verify architecture dependencies
        shell: pwsh
        run: ./eng/verify-architecture.ps1 -RepoRoot .

      - name: Verify API and desktop contract drift
        shell: pwsh
        run: ./eng/verify-contract-drift.ps1 -RepoRoot .

      - name: Upload contract drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-drift-report
          path: artifacts/contract-drift/contract-drift-report.md

      - name: Build
        run: dotnet build DragonEnvelopes.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DragonEnvelopes.sln --configuration Release --no-build --logger trx --results-directory TestResults

      - name: Publish desktop app (win-x64)
        run: dotnet publish client/DragonEnvelopes.Desktop/DragonEnvelopes.Desktop.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:SatelliteResourceLanguages=en --output artifacts/desktop/publish

      - name: Build desktop MSI installer
        run: dotnet build installer/DragonEnvelopes.Desktop.Installer/DragonEnvelopes.Desktop.Installer.wixproj --configuration Release -p:ProductVersion=1.0.${{ github.run_number }} -p:PublishDir="${{ github.workspace }}\\artifacts\\desktop\\publish"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Upload desktop publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragonenvelopes-desktop-publish
          path: artifacts/desktop/publish/**

      - name: Upload desktop MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragonenvelopes-desktop-msi
          path: installer/**/bin/**/DragonEnvelopes.Desktop.Setup.msi

  linux-service-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore API services
        run: |
          dotnet restore src/DragonEnvelopes.Api/DragonEnvelopes.Api.csproj
          dotnet restore src/DragonEnvelopes.Family.Api/DragonEnvelopes.Family.Api.csproj
          dotnet restore src/DragonEnvelopes.Ledger.Api/DragonEnvelopes.Ledger.Api.csproj

      - name: Build API services
        run: |
          dotnet build src/DragonEnvelopes.Api/DragonEnvelopes.Api.csproj --configuration Release --no-restore
          dotnet build src/DragonEnvelopes.Family.Api/DragonEnvelopes.Family.Api.csproj --configuration Release --no-restore
          dotnet build src/DragonEnvelopes.Ledger.Api/DragonEnvelopes.Ledger.Api.csproj --configuration Release --no-restore

      - name: Run split integration tests
        run: |
          dotnet test tests/DragonEnvelopes.Family.Api.IntegrationTests/DragonEnvelopes.Family.Api.IntegrationTests.csproj --configuration Release --verbosity minimal
          dotnet test tests/DragonEnvelopes.Ledger.Api.IntegrationTests/DragonEnvelopes.Ledger.Api.IntegrationTests.csproj --configuration Release --verbosity minimal

  docker-smoke-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api
            dockerfile: src/DragonEnvelopes.Api/Dockerfile
          - name: family-api
            dockerfile: src/DragonEnvelopes.Family.Api/Dockerfile
          - name: ledger-api
            dockerfile: src/DragonEnvelopes.Ledger.Api/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Smoke build Dockerfile
        run: docker build --file ${{ matrix.service.dockerfile }} --tag dragonenvelopes-ci-${{ matrix.service.name }}:${{ github.sha }} .

  compose-runtime-smoke:
    runs-on: ubuntu-latest
    needs: docker-smoke-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start compose services
        run: docker compose --profile microservices up -d --build api family-api ledger-api postgres keycloak

      - name: Wait for readiness endpoints
        shell: bash
        run: |
          set -euo pipefail

          wait_for() {
            local name="$1"
            local url="$2"
            local max_attempts=90
            local sleep_seconds=5

            echo "Waiting for ${name} at ${url}"
            for attempt in $(seq 1 "${max_attempts}"); do
              if curl -fsS "${url}" > /dev/null; then
                echo "${name} is ready."
                return 0
              fi

              if (( attempt % 10 == 0 )); then
                echo "Still waiting for ${name} (attempt ${attempt}/${max_attempts})..."
              fi

              sleep "${sleep_seconds}"
            done

            echo "${name} did not become ready in time."
            docker compose ps
            docker compose logs --tail=200 api family-api ledger-api keycloak postgres
            return 1
          }

          wait_for "API" "http://localhost:18088/health/ready"
          wait_for "Family API" "http://localhost:18089/health/ready"
          wait_for "Ledger API" "http://localhost:18090/health/ready"

      - name: Run end-to-end smoke scenario
        shell: bash
        run: bash ./eng/run-e2e-smoke.sh

      - name: Capture compose logs on smoke failure
        if: failure()
        shell: bash
        run: |
          mkdir -p artifacts/e2e-smoke
          docker compose --profile microservices ps > artifacts/e2e-smoke/compose-ps.txt || true
          docker compose --profile microservices logs --no-color api family-api ledger-api keycloak postgres > artifacts/e2e-smoke/compose-logs.txt || true

      - name: Stop compose services
        if: always()
        run: docker compose --profile microservices down -v --remove-orphans

      - name: Upload e2e smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: artifacts/e2e-smoke/**
          if-no-files-found: warn

  observability-compose-smoke:
    runs-on: ubuntu-latest
    needs: compose-runtime-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start compose services with observability
        run: docker compose --profile observability --profile microservices up -d --build api family-api ledger-api postgres keycloak loki promtail grafana

      - name: Wait for observability readiness endpoints
        shell: bash
        run: |
          set -euo pipefail

          wait_for() {
            local name="$1"
            local url="$2"
            local max_attempts=90
            local sleep_seconds=5

            echo "Waiting for ${name} at ${url}"
            for attempt in $(seq 1 "${max_attempts}"); do
              if curl -fsS "${url}" > /dev/null; then
                echo "${name} is ready."
                return 0
              fi

              if (( attempt % 10 == 0 )); then
                echo "Still waiting for ${name} (attempt ${attempt}/${max_attempts})..."
              fi

              sleep "${sleep_seconds}"
            done

            echo "${name} did not become ready in time."
            docker compose ps
            docker compose logs --tail=200 api family-api ledger-api loki promtail grafana keycloak postgres
            return 1
          }

          wait_for "API" "http://localhost:18088/health/ready"
          wait_for "Family API" "http://localhost:18089/health/ready"
          wait_for "Ledger API" "http://localhost:18090/health/ready"
          wait_for "Loki" "http://localhost:3100/ready"
          wait_for "Grafana" "http://localhost:3000/api/health"

      - name: Stop compose services
        if: always()
        run: docker compose --profile observability --profile microservices down -v --remove-orphans
