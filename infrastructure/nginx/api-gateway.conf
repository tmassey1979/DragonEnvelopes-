worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Single ingress target for desktop clients.
    # Route to split services by API path. Unmapped API routes return 404.
    map $request_uri $dragonenvelopes_upstream {
        default "";

        # Ledger routes under family prefix.
        ~^/api/v[0-9]+/families/[^/]+/recurring-bills/ ledger-api:8080;

        # Financial routes under family prefix.
        ~^/api/v[0-9]+/families/[^/]+/financial(?:/|$) financial-api:8080;
        ~^/api/v[0-9]+/families/[^/]+/financial-accounts(?:/|$) financial-api:8080;
        ~^/api/v[0-9]+/families/[^/]+/notifications(?:/|$) financial-api:8080;
        ~^/api/v[0-9]+/families/[^/]+/envelopes/[^/]+/cards(?:/|$) financial-api:8080;
        ~^/api/v[0-9]+/families/[^/]+/envelopes/[^/]+/financial-account(?:s/stripe)?(?:/|$) financial-api:8080;
        ~^/api/v[0-9]+/webhooks/(stripe|plaid)(?:/|$) financial-api:8080;

        # Ledger bounded-context routes.
        ~^/api/v[0-9]+/(accounts|transactions|envelopes|budgets|reports|automation|recurring-bills|imports|approvals|spend-anomalies|envelope-goals|scenarios)(?:/|$) ledger-api:8080;

        # Family bounded-context routes.
        ~^/api/v[0-9]+/(families|auth)(?:/|$) family-api:8080;
    }

    server {
        listen 8080;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        location = /health/live {
            add_header Content-Type text/plain;
            return 200 "OK";
        }

        location = /health/ready {
            add_header Content-Type text/plain;
            return 200 "READY";
        }

        location = /health/ready/family {
            proxy_pass http://family-api:8080/health/ready;
        }

        location = /health/ready/ledger {
            proxy_pass http://ledger-api:8080/health/ready;
        }

        location = /health/ready/financial {
            proxy_pass http://financial-api:8080/health/ready;
        }

        location / {
            if ($dragonenvelopes_upstream = "") {
                return 404;
            }

            set $target http://$dragonenvelopes_upstream;
            proxy_pass $target;
        }
    }
}
