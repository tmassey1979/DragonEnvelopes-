services:
  postgres:
    image: postgres:16
    container_name: dragonenvelopes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      APP_DB_NAME: ${APP_DB_NAME:-dragonenvelopes_app}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:-keycloak}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - dragonenvelopes_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dragonenvelopes-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@dragonenvelopes.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./infrastructure/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./infrastructure/pgadmin/pgpass:/pgpass:ro
    networks:
      - dragonenvelopes_net

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: dragonenvelopes-keycloak
    restart: unless-stopped
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-18080}:8080"
    volumes:
      - ./infrastructure/keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - dragonenvelopes_net

  api:
    container_name: dragonenvelopes-api
    build:
      context: .
      dockerfile: src/DragonEnvelopes.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${APP_DB_NAME:-dragonenvelopes_app};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Authentication__Authority: http://keycloak:8080/realms/${KEYCLOAK_REALM:-dragonenvelopes}
      Authentication__PublicAuthority: http://localhost:${KEYCLOAK_PORT:-18080}/realms/${KEYCLOAK_REALM:-dragonenvelopes}
      Authentication__Audience: ${KEYCLOAK_CLIENT_ID:-dragonenvelopes-api}
      Keycloak__ServerUrl: http://keycloak:8080
      Keycloak__Realm: ${KEYCLOAK_REALM:-dragonenvelopes}
      Keycloak__AdminRealm: ${KEYCLOAK_ADMIN_REALM:-master}
      Keycloak__AdminClientId: ${KEYCLOAK_ADMIN_CLIENT_ID:-admin-cli}
      Keycloak__AdminUsername: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:-admin}
      Keycloak__AdminPassword: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      Observability__EnableLokiSink: ${OBSERVABILITY_ENABLE_LOKI_SINK:-false}
      Observability__LokiUrl: ${OBSERVABILITY_LOKI_URL:-http://loki:3100}
    ports:
      - "${API_PORT:-18088}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - dragonenvelopes_net

  family-api:
    container_name: dragonenvelopes-family-api
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: src/DragonEnvelopes.Family.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${APP_DB_NAME:-dragonenvelopes_app};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Authentication__Authority: http://keycloak:8080/realms/${KEYCLOAK_REALM:-dragonenvelopes}
      Authentication__PublicAuthority: http://localhost:${KEYCLOAK_PORT:-18080}/realms/${KEYCLOAK_REALM:-dragonenvelopes}
      Authentication__Audience: ${KEYCLOAK_CLIENT_ID:-dragonenvelopes-api}
      Keycloak__ServerUrl: http://keycloak:8080
      Keycloak__Realm: ${KEYCLOAK_REALM:-dragonenvelopes}
      Keycloak__AdminRealm: ${KEYCLOAK_ADMIN_REALM:-master}
      Keycloak__AdminClientId: ${KEYCLOAK_ADMIN_CLIENT_ID:-admin-cli}
      Keycloak__AdminUsername: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:-admin}
      Keycloak__AdminPassword: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:-admin}
    ports:
      - "${FAMILY_API_PORT:-18089}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - dragonenvelopes_net

  ledger-api:
    container_name: dragonenvelopes-ledger-api
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: src/DragonEnvelopes.Ledger.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${APP_DB_NAME:-dragonenvelopes_app};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Authentication__Authority: http://keycloak:8080/realms/${KEYCLOAK_REALM:-dragonenvelopes}
      Authentication__PublicAuthority: http://localhost:${KEYCLOAK_PORT:-18080}/realms/${KEYCLOAK_REALM:-dragonenvelopes}
      Authentication__Audience: ${KEYCLOAK_CLIENT_ID:-dragonenvelopes-api}
    ports:
      - "${LEDGER_API_PORT:-18090}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - dragonenvelopes_net

  loki:
    image: grafana/loki:3.0.0
    container_name: dragonenvelopes-loki
    restart: unless-stopped
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./infrastructure/observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    networks:
      - dragonenvelopes_net

  promtail:
    image: grafana/promtail:3.0.0
    container_name: dragonenvelopes-promtail
    restart: unless-stopped
    profiles: ["observability"]
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      loki:
        condition: service_started
    volumes:
      - ./infrastructure/observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dragonenvelopes_net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: dragonenvelopes-grafana
    restart: unless-stopped
    profiles: ["observability"]
    depends_on:
      loki:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - dragonenvelopes_net

volumes:
  postgres_data:
  pgadmin_data:
  loki_data:
  grafana_data:

networks:
  dragonenvelopes_net:
    name: dragonenvelopes-net
