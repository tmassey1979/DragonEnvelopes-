services:
  postgres:
    image: postgres:16
    container_name: dragonenvelopes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      APP_DB_NAME: ${APP_DB_NAME:-dragonenvelopes_app}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:-keycloak}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - dragonenvelopes_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dragonenvelopes-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@dragonenvelopes.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./infrastructure/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./infrastructure/pgadmin/pgpass:/pgpass:ro
    networks:
      - dragonenvelopes_net

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: dragonenvelopes-keycloak
    restart: unless-stopped
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-18080}:8080"
    volumes:
      - ./infrastructure/keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - dragonenvelopes_net

  api:
    container_name: dragonenvelopes-api
    build:
      context: .
      dockerfile: src/DragonEnvelopes.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${APP_DB_NAME:-dragonenvelopes_app};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Authentication__Authority: http://keycloak:8080/realms/${KEYCLOAK_REALM:-dragonenvelopes}
      Authentication__Audience: ${KEYCLOAK_CLIENT_ID:-dragonenvelopes-api}
    ports:
      - "${API_PORT:-18088}:8080"
    networks:
      - dragonenvelopes_net

volumes:
  postgres_data:
  pgadmin_data:

networks:
  dragonenvelopes_net:
    name: dragonenvelopes-net
